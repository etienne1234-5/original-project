<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact Us - Your Business</title>
<style>
  /* Reset some default styles */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #89f7fe, #66a6ff);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    color: #333;
    line-height: 1.6;
    padding: 20px;
  }

  @keyframes gradientShift {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }

  header {
    text-align: center;
    padding: 30px 20px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 10px;
    margin-bottom: 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  header h1 {
    font-size: 2.5em;
    color: #fff;
    margin-bottom: 10px;
  }

  header p {
    font-size: 1.2em;
    color: #fff;
  }

  .container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* Contact Form Styles */
  .contact-form {
    flex: 1 1 45%;
    background: rgba(255,255,255,0.8);
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .contact-form:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

  .contact-form h2 {
    margin-bottom: 20px;
    color: #333;
  }

  form {
    display: flex;
    flex-direction: column;
  }

  label {
    margin-bottom: 8px;
    font-weight: bold;
    color: #555;
  }

  input, textarea {
    padding: 10px;
    margin-bottom: 15px;
    border: 2px solid #ccc;
    border-radius: 8px;
    font-size: 1em;
    transition: border-color 0.3s;
  }

  input:focus, textarea:focus {
    border-color: #66a6ff;
    outline: none;
  }

  button {
    padding: 12px;
    background: #66a6ff;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1.1em;
    cursor: pointer;
    transition: background 0.3s, transform 0.2s;
  }

  button:hover {
    background: #558de8;
    transform: scale(1.05);
  }

  /* Contact Details Styles */
  .contact-details {
    flex: 1 1 45%;
    background: rgba(255,255,255,0.8);
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .contact-details h2 {
    color: #333;
    margin-bottom: 15px;
  }

  .detail {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .detail i {
    font-size: 1.5em;
    color: #66a6ff;
  }

  .detail span {
    font-size: 1.1em;
    color: #555;
  }

  /* Map Section */
  .map {
    width: 100%;
    height: 400px;
    margin-top: 30px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  /* Responsive styles */
  @media(max-width: 768px) {
    .container {
      flex-direction: column;
    }
    .contact-form, .contact-details {
      flex: 1 1 100%;
    }
  }
</style>
</head>
<body>
<header>
  <h1>Contact Us</h1>
  <p>We'd love to hear from you! Fill out the form below or reach us through our contact details.</p>
</header>

<div class="container">
  <!-- Contact Form -->
  <div class="contact-form">
    <h2>Send Us a Message</h2>
    <form action="#" method="post">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your Name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Your Email" required />

      <label for="subject">Subject</label>
      <input type="text" id="subject" name="subject" placeholder="Subject" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" placeholder="Your Message" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </div>

  <!-- Contact Details -->
  <div class="contact-details">
    <h2>Contact Details</h2>
    <div class="detail">
      <i class="fas fa-phone"></i>
      <span>+250 781340767</span>
    </div>
    <div class="detail">
      <i class="fas fa-envelope"></i>
      <span>nirereperuth1@gmail.com</span>
    </div>
    <div class="detail">
      <i class="fas fa-map-marker-alt"></i>
      <span>KICUKIRO, KIGALI, RWAND</span>
    </div>
    <div class="detail">
      <i class="fas fa-clock"></i>
      <span>Mon - Sat: 9:00 AM - 6:00 PM</span>
    </div>
  </div>
</div>

<!-- Map Embed (Google Maps or any map service) -->
<div class="map">
  <iframe
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1998.304846607867!2d30.055019315912935!3d-1.9560540997119794!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x19dd19f8b4d0a0f7%3A0x621f7f10a6e3b8b!2sKigali%20Kicukiro!5e0!3m2!1sen!2srw!4v1705838371928"
    width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
</div>

</body>
</html>
